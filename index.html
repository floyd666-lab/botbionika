<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Новая заявка</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container">
        <header class="header">
            <div class="icon-wrapper">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            </div>
            <h1>Новая заявка</h1>
            <p>Заполните форму для закупки материалов</p>
        </header>

        <form id="orderForm" class="glass-form">
            <div class="form-group">
                <label for="materials">Материалы и количество</label>
                <textarea id="materials" placeholder="Например:&#10;Медь 120-10 — 25 метров&#10;Шпильки 3 - 10 шт" rows="4" required></textarea>
                <div class="error-msg" id="materials-error">Минимум 10 символов</div>
            </div>

            <div class="form-group">
                <label for="objectName">Объект (название/номер)</label>
                <input type="text" id="objectName" placeholder="Введите название объекта" required>
                <div class="error-msg" id="object-error">Минимум 2 символа</div>
            </div>

            <div class="form-group">
                <label for="productName">Изделие (марка/номер)</label>
                <input type="text" id="productName" placeholder="Введите изделие" required>
                <div class="error-msg" id="product-error">Минимум 2 символа</div>
            </div>

            <button type="button" class="submit-btn" id="submitBtn">
                <span>Сформировать заявку</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
